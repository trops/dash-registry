name: Validate PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate Package Manifests
    runs-on: ubuntu-latest
    outputs:
      is-update: ${{ steps.check-identity.outputs.is-update }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci

      - name: Validate manifests
        run: npm run validate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify identity and check for auto-merge
        id: check-identity
        run: |
          # Find changed manifest files
          CHANGED_MANIFESTS=$(git diff --name-only origin/main...HEAD | grep 'packages/.*/manifest.json' || true)

          if [ -z "$CHANGED_MANIFESTS" ]; then
              echo "No manifest changes detected."
              echo "is-update=false" >> "$GITHUB_OUTPUT"
              exit 0
          fi

          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          IS_UPDATE="true"

          for MANIFEST in $CHANGED_MANIFESTS; do
              # Extract the scope directory name (packages/{scope}/...)
              SCOPE_DIR=$(echo "$MANIFEST" | cut -d'/' -f2)

              # Read githubUser or scope from manifest
              if [ -f "$MANIFEST" ]; then
                  MANIFEST_USER=$(node -e "
                      const m = JSON.parse(require('fs').readFileSync('$MANIFEST', 'utf8'));
                      console.log(m.githubUser || m.scope || '');
                  ")

                  # Verify githubUser matches PR author
                  if [ -n "$MANIFEST_USER" ] && [ "$MANIFEST_USER" != "$PR_AUTHOR" ]; then
                      echo "ERROR: Manifest githubUser/scope '$MANIFEST_USER' does not match PR author '$PR_AUTHOR'"
                      echo "File: $MANIFEST"
                      exit 1
                  fi

                  # Verify githubUser matches directory name
                  if [ -n "$MANIFEST_USER" ] && [ "$MANIFEST_USER" != "$SCOPE_DIR" ]; then
                      echo "ERROR: Manifest githubUser/scope '$MANIFEST_USER' does not match directory '$SCOPE_DIR'"
                      echo "File: $MANIFEST"
                      exit 1
                  fi

                  # Check download URL is reachable
                  DOWNLOAD_URL=$(node -e "
                      const m = JSON.parse(require('fs').readFileSync('$MANIFEST', 'utf8'));
                      let url = m.downloadUrl || '';
                      url = url.replace(/\{version\}/g, m.version || '');
                      url = url.replace(/\{name\}/g, m.name || '');
                      console.log(url);
                  ")

                  if [ -n "$DOWNLOAD_URL" ]; then
                      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$DOWNLOAD_URL" || echo "000")
                      if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "302" ]; then
                          echo "WARNING: Download URL returned HTTP $HTTP_STATUS: $DOWNLOAD_URL"
                      else
                          echo "Download URL is reachable: $DOWNLOAD_URL"
                      fi
                  fi

                  # Check if this is a new user (no existing packages for this user)
                  EXISTING_PACKAGES=$(find packages/$SCOPE_DIR -name "manifest.json" 2>/dev/null | wc -l | tr -d ' ')

                  # If this manifest is the only one and it's newly added, it's a new user
                  if git diff --diff-filter=A --name-only origin/main...HEAD | grep -q "$MANIFEST"; then
                      if [ "$EXISTING_PACKAGES" -le "1" ]; then
                          echo "New user detected: $SCOPE_DIR — requires human review"
                          IS_UPDATE="false"
                      fi
                  fi
              fi
          done

          echo "is-update=$IS_UPDATE" >> "$GITHUB_OUTPUT"

  auto-merge:
    name: Auto-merge version updates
    needs: validate
    if: needs.validate.outputs.is-update == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Label as auto-approved
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['auto-approved', 'version-update']
            });

      - name: Auto-approve PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'APPROVE',
                body: 'Auto-approved: version update from existing registry user.'
            });

      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                merge_method: 'squash'
            });

      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'deploy.yml',
                ref: 'main'
            });

  label-new-user:
    name: Label new user PRs for review
    needs: validate
    if: needs.validate.outputs.is-update == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Label for human review
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['needs-review', 'new-user']
            });
